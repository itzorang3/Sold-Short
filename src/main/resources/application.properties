# ── Port ──────────────────────────────────────────────────────────────────────
# Railway injects PORT automatically; fall back to 8080 for local development.
server.port=${PORT:8080}

# ── Database ───────────────────────────────────────────────────────────────────
# Override DB_PATH env var on Railway to set a persistent volume path.
# Example: DB_PATH=/data/soldshort.db
sold-short.db-path=${DB_PATH:soldshort.db}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.soldshort=INFO
logging.level.org.springframework=WARN
